<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoNet Catalyst</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">DoNet <span>Catalyst</span></div>
            <nav>
                <span class="status-dot"></span> Online
            </nav>
        </header>

        <main>
            <div class="search-wrapper">
                <input type="text" id="browser-input" placeholder="Пошук в DoNet або введення команди...">
                <button id="go-btn">Go</button>
            </div>
            
            <div id="content-display" class="card">
                <div class="welcome-text">
                    <h2>Вітаємо в майбутньому</h2>
                    <p>Введіть назву вузла або команду для початку роботи.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
