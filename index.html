<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoNet Catalyst OS | Cloud Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="context-menu" class="hidden">
        <div class="menu-item" onclick="toggleDevTools()">Посмотреть код сторінки</div>
        <hr>
        <div class="menu-item" onclick="location.reload()">Перезавантажити</div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">DoNet <span>Catalyst Cloud</span></div>
            <div class="system-info">Server: Supabase DB | Status: <span id="db-status">Connecting...</span></div>
        </header>

        <main>
            <div class="search-container">
                <div class="search-wrapper">
                    <input type="text" id="browser-input" placeholder="Пошук або 'create назва'..." autocomplete="off">
                    <button id="go-btn">Перейти</button>
                    <div id="suggestions" class="hidden"></div>
                </div>
            </div>
            
            <div id="content-display" class="card">
                <h2>Завантаження мережі...</h2>
            </div>
        </main>
    </div>

    <div id="devtools" class="devtools-hidden">
        <div class="devtools-tabs">
            <button onclick="showTab('elements')">Elements</button>
            <button onclick="showTab('console')">Console</button>
            <button class="close-btn" onclick="toggleDevTools()">×</button>
        </div>
        <div id="devtools-content">
            <pre id="code-inspector" contentEditable="true" spellcheck="false"></pre>
            <div id="console-log" style="display: none;"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
