<div id="top-bar" style="background: #1a1a1a; padding: 10px; display: flex; gap: 10px; border-bottom: 2px solid #333; align-items: center;">
    <button onclick="goHome()" style="background: #333; border: 1px solid #555; color: white; padding: 5px 10px; cursor: pointer; border-radius: 5px;">🏠 Home</button>
    <input type="text" id="address-bar" placeholder="donet://назва-сайту" 
           style="flex-grow: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 8px; border-radius: 5px; font-family: monospace;">
    <button onclick="goDirect()" style="background: #00ff00; color: #000; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">GO</button>
</div>

<div id="search-screen" style="text-align: center; padding-top: 50px;">
    <h1 style="color: #00ff00; font-size: 48px; margin-bottom: 20px;">DoNet <span style="color: white;">Search</span></h1>
    
    <div style="max-width: 600px; margin: 0 auto; position: relative;">
        <input type="text" id="search-input" placeholder="Що хочеш знайти в мережі?" 
               style="width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #444; background: #222; color: white; font-size: 18px;">
        <button onclick="startSearch()" style="margin-top: 20px; padding: 10px 30px; border-radius: 20px; border: none; background: #444; color: white; cursor: pointer;">Пошук в DoNet</button>
    </div>

    <div id="history-section" style="margin-top: 40px;">
        <p style="color: #666;">Останні відвідані:</p>
        <div id="recent-sites" style="display: flex; justify-content: center; gap: 10px; margin-top: 10px;"></div>
    </div>
</div>

<div id="browser-screen" style="display: none; padding: 20px;">
    <div id="browser-content"></div>
</div>
